# Hexo Configuration
## https://hexo.io/docs/configuration.html

# Site
title: ZZH 的随笔
subtitle: 记录日常灵感与随想
description: ''
keywords:
author: ZZH
language: zh-CN
timezone: Asia/Shanghai

# URL
## 重点：项目页部署，url 与 root 必须匹配仓库路径
url: https://zzh-learner.github.io/zzh-notes/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js

# Markdown 渲染器配置（hexo-renderer-marked）
# 注意：键名是 camelCase（renderer.js 内部读 prependRoot / postAsset，下划线版会被忽略）
# prependRoot: 把文章里相对路径的图片/链接自动解析到该文章的资源文件夹
# postAsset:   开启文章资源夹查找（配合 post_asset_folder: true）
marked:
  prependRoot: true
  postAsset: true

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
# 'empty' = 文章 front-matter 里没手写 updated: 就不显示更新时间。
# 原因：mtime 会随 git clone/checkout/pull 全部刷新成"今天"，导致旧文章也显示"更新于今天"。
# 真要给某篇标注更新时间，就在那篇 front-matter 里手动加 updated: 即可。
updated_option: 'empty'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## 主题通过 npm 引入，这里只写包名
theme: next

# Deployment
## 不用 hexo deploy，改用 GitHub Actions 部署
deploy:
  type: ''

# 搜索插件（hexo-generator-searchdb）
search:
  path: search.xml
  field: post
  content: true
  format: html

# RSS 插件（hexo-generator-feed）
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  content: true
  content_limit: 140
  content_limit_delim: ' '
